name: Build and Deploy Backend to Cloud Run

on:
  push:
    branches: [ main ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  GAR_NAME: the-commons-repo

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet
          gcloud artifacts repositories create ${GAR_NAME} --repository-format=docker --location=${REGION} --quiet || true

      # AI Service
      - name: Build AI Service
        run: docker build -t ${REGION}-docker.pkg.dev/${PROJECT_ID}/${GAR_NAME}/ai-service:latest ./services/ai-service
      - name: Push AI Service
        run: docker push ${REGION}-docker.pkg.dev/${PROJECT_ID}/${GAR_NAME}/ai-service:latest
      - name: Deploy AI Service
        run: |
          gcloud run deploy ai-service \
            --image ${REGION}-docker.pkg.dev/${PROJECT_ID}/${GAR_NAME}/ai-service:latest \
            --region ${REGION} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080

      # Auth Service
      - name: Build Auth Service
        run: docker build -t ${REGION}-docker.pkg.dev/${PROJECT_ID}/${GAR_NAME}/auth-service:latest ./services/auth-service
      - name: Push Auth Service
        run: docker push ${REGION}-docker.pkg.dev/${PROJECT_ID}/${GAR_NAME}/auth-service:latest
      - name: Deploy Auth Service
        run: |
          gcloud run deploy auth-service \
            --image ${REGION}-docker.pkg.dev/${PROJECT_ID}/${GAR_NAME}/auth-service:latest \
            --region ${REGION} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080

      # Business Events Service
      - name: Build Business Service
        run: docker build -t ${REGION}-docker.pkg.dev/${PROJECT_ID}/${GAR_NAME}/business-service:latest ./services/business-events-service
      - name: Push Business Service
        run: docker push ${REGION}-docker.pkg.dev/${PROJECT_ID}/${GAR_NAME}/business-service:latest
      - name: Deploy Business Service
        run: |
          gcloud run deploy business-service \
            --image ${REGION}-docker.pkg.dev/${PROJECT_ID}/${GAR_NAME}/business-service:latest \
            --region ${REGION} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080

      # Community Service
      - name: Build Community Service
        run: docker build -t ${REGION}-docker.pkg.dev/${PROJECT_ID}/${GAR_NAME}/community-service:latest ./services/community-service
      - name: Push Community Service
        run: docker push ${REGION}-docker.pkg.dev/${PROJECT_ID}/${GAR_NAME}/community-service:latest
      - name: Deploy Community Service
        run: |
          gcloud run deploy community-service \
            --image ${REGION}-docker.pkg.dev/${PROJECT_ID}/${GAR_NAME}/community-service:latest \
            --region ${REGION} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080

      # Gateway
      - name: Build Gateway
        run: docker build -t ${REGION}-docker.pkg.dev/${PROJECT_ID}/${GAR_NAME}/gateway:latest ./gateway
      - name: Push Gateway
        run: docker push ${REGION}-docker.pkg.dev/${PROJECT_ID}/${GAR_NAME}/gateway:latest
      - name: Deploy Gateway
        run: |
          gcloud run deploy gateway \
            --image ${REGION}-docker.pkg.dev/${PROJECT_ID}/${GAR_NAME}/gateway:latest \
            --region ${REGION} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080
